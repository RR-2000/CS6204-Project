router bgp 200
  bgp router-id 10.100.2.1
  no bgp ebgp-requires-policy
  no bgp enforce-first-as

  neighbor 10.0.0.254 remote-as 1337
  neighbor 10.0.0.254 timers 10 30
  neighbor 10.0.1.2 remote-as 400
  neighbor 10.0.1.2 timers 10 30

  address-family ipv4 unicast
    network 10.2.0.0/24
    network 10.0.0.0/24
  exit-address-family
